{{ define "title" }}Contato{{ end }}

{{ define "content" }}
<div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 max-w-md mx-auto mt-10">
    <h2 class="text-2xl font-bold text-slate-800 mb-4">Fale conosco</h2>
    <form id="contact-form" hx-post="/contact" hx-target="#form-errors" hx-swap="innerHTML">
        <div id="form-errors"></div>
        <label class="block mb-2 text-sm font-medium text-slate-700" for="name">Nome</label>
        <input class="w-full border border-slate-300 rounded-lg px-3 py-2 mb-4" type="text" id="name" name="name" required>
        <label class="block mb-2 text-sm font-medium text-slate-700" for="email">Email</label>
        <input class="w-full border border-slate-300 rounded-lg px-3 py-2 mb-4" type="email" id="email" name="email" required>
        <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-xl transition" type="submit">
            Enviar
        </button>
    </form>
</div>
{{ end }}
