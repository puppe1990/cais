{{ define "base" }}
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ block "title" . }}Cais{{ end }}</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
    <link rel="manifest" href="/static/manifest.webmanifest" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Cais" />
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
    <link rel="icon" href="/static/icons/icon.svg" type="image/svg+xml" />
    <script src="/static/js/htmx.min.js" defer></script>
  </head>
  <body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
    <header class="bg-white border-b border-slate-200 p-4 shadow-sm">
      <div class="max-w-5xl mx-auto flex justify-between items-center">
        <h1 class="font-bold text-xl text-indigo-600">Cais</h1>
      </div>
    </header>
    <main class="flex-grow max-w-5xl w-full mx-auto p-6">{{ template "content" . }}</main>
    <footer class="border-t border-slate-200 p-4 text-center text-sm text-slate-500">
      Rodando leve no Lightsail
    </footer>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/static/js/sw.js");
      }
    </script>
  </body>
</html>
{{ end }}
